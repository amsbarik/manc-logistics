<header class="fixed top-0 left-0 w-full z-50">
        <nav class="bg-primary-50 py-1 shadow-md">
            
            <div class="container mx-auto">
                
                <div class="flex items-center justify-between h-18">

                    <!-- ========= LOGO ========= -->
                    <a href="{% url 'index' %}" class="flex items-center gap-3">
                        
                        <!-- <div class="w-11 h-11 rounded-2xl bg-primary flex items-center justify-center shadow-lg shadow-primary/30">
                            <span class="text-white text-xl font-bold">M</span>
                        </div>

                        <div>
                            <h2 class="text-dark-900 text-xl font-bold leading-none">
                                MANC Riders
                            </h2>

                            <p class="text-gray-400 text-xs mt-1">
                                Food Delivery Company
                            </p>
                        </div> -->
                        {% if site_setting.header_logo %}
                        <img src="{{ site_setting.header_logo.url }}" class="h-[60px] w-auto" alt="">
                        {% endif %}
                    </a>

                    

                    <!-- ========= RIGHT SECTION ========= -->
                    <div class="hidden lg:flex items-center gap-4">

                        <!-- Search -->
                        <!-- <div class="relative">
                            <input
                                type="text"
                                placeholder="Search products..."
                                class="w-64 h-12 rounded-full bg-white/10 border border-primary pl-5 pr-14 text-white placeholder:text-gray-400 outline-none focus:border-secondary transition"
                            >

                            <button class="absolute right-1 top-1 h-10 px-4 rounded-full bg-secondary text-white font-medium hover:opacity-90 transition">
                                Search
                            </button>
                        </div> -->
                        <!-- ========= DESKTOP MENU ========= -->
                        <div class="hidden lg:flex items-center gap-8 lg:text-base xl:text-lg">
                            <a href="{% url 'services' %}" class="text-dark-900 font-medium hover:text-secondary transition duration-300"> Services </a>
                            <a href="{% url 'vendors' %}" class="text-dark-900 font-medium hover:text-secondary transition duration-300"> Restaurants  </a>
                            <a href="{% url 'riders' %}" class="text-dark-900 font-medium hover:text-secondary transition duration-300"> Riders  </a>
                            <a href="{% url 'about_us' %}" class="text-dark-900 font-medium hover:text-secondary transition duration-300"> About Us </a>
                            <a href="{% url 'contact_us' %}" class="text-dark-900 font-medium hover:text-secondary transition duration-300"> Contact </a>
                        </div>

                        <!-- Login -->
                        <!-- <a href="#"
                           class="h-12 px-5 rounded-full border border-primary text-primary flex items-center justify-center hover:bg-white/10 transition lg:text-sm xl:text-base">
                            Login
                        </a> -->

                        <!-- Register -->
                        <a href="{% url 'rider_register' %}"
                           class="h-12 px-6 rounded-full bg-primary text-white font-semibold flex items-center justify-center hover:scale-105 transition duration-300 shadow-lg shadow-primary/30 lg:text-sm xl:text-base">
                            Rider Register
                        </a>

                        <!-- ========= LANGUAGE DROPDOWN ========= -->
                        <div class="relative group lg:text-sm xl:text-base">

                            <!-- Dropdown Button -->
                            <button
                                class="flex items-center gap-2 h-12 px-5 rounded-full bg-white/10 border border-primary/10 text-dark-900 hover:border-secondary transition"
                            >
                                <!-- Globe Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="w-5 h-5">
                                    <path stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M12 21a9 9 0 100-18 9 9 0 000 18zm0 0c2.485 0 4.5-4.03 4.5-9s-2.015-9-4.5-9m0 18c-2.485 0-4.5-4.03-4.5-9s2.015-9 4.5-9m-9 9h18" />
                                </svg>

                                {% if LANGUAGE_CODE == 'ar' %}
                                    <!-- <span class="text-xl">🇸🇦</span> -->
                                    <span class="font-medium">العربية</span>
                                {% else %}
                                    <!-- <span class="text-xl">🇺🇸</span> -->
                                    <span class="font-medium">English</span>
                                {% endif %}

                                <!-- Arrow -->
                                <svg xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="w-4 h-4">
                                    <path stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                                </svg>
                            </button>

                            <!-- Language Dropdown -->
                            <div class="absolute right-0 mt-0 p-2 w-56 rounded-xl bg-white shadow-2xl border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition duration-300 overflow-hidden">

                                <!-- English -->
                                <form action="{% url 'set_language' %}" method="post">
                                    {% csrf_token %}
                                    <input type="hidden" name="language" value="en">
                                    <input type="hidden" name="next" value="{{ request.get_full_path }}">

                                    <button type="submit"
                                        class="w-full flex items-center justify-between px-5 py-2 rounded-sm hover:bg-secondary-100 transition">

                                        <div class="flex items-center gap-3">
                                            <span class="text-xl">🇺🇸</span>
                                            <span class="font-medium text-primary">English</span>
                                        </div>

                                        {% if LANGUAGE_CODE == 'en' %}
                                        <span class="text-xs bg-secondary text-white px-2 py-1 rounded-full">
                                            Active
                                        </span>
                                        {% endif %}

                                    </button>
                                </form>


                                <!-- Arabic -->
                                <form action="{% url 'set_language' %}" method="post">
                                    {% csrf_token %}
                                    <input type="hidden" name="language" value="ar">
                                    <input type="hidden" name="next" value="{{ request.get_full_path }}">

                                    <button type="submit"
                                        class="w-full flex items-center gap-3 px-5 py-2 rounded-sm hover:bg-secondary-100 transition">

                                        <span class="text-xl">🇸🇦</span>
                                        <span class="font-medium text-primary">العربية</span>

                                        {% if LANGUAGE_CODE == 'ar' %}
                                        <span class="text-xs bg-secondary text-white px-2 py-1 rounded-full ml-auto">
                                            Active
                                        </span>
                                        {% endif %}

                                    </button>
                                </form>

                            </div>

                        </div>
                        
                    </div>



                    <!-- ========= MOBILE MENU BUTTON ========= -->
                    <!-- <button id="menuBtn" class="lg:hidden w-12 h-12 rounded-xl bg-dark/10 flex items-center justify-center text-dark-900" >
                        <svg xmlns="http://www.w3.org/2000/svg"
                             fill="none"
                             viewBox="0 0 24 24"
                             stroke-width="1.5"
                             stroke="currentColor"
                             class="w-7 h-7">
                            <path stroke-linecap="round"
                                  stroke-linejoin="round"
                                  d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
                        </svg>
                    </button> -->

                    <button id="menuBtn" class="lg:hidden w-12 h-12 rounded-xl bg-dark/10 flex items-center justify-center text-dark-900">

                        <svg xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke-width="1.5"
                            stroke="currentColor"
                            class="w-7 h-7">

                            <path stroke-linecap="round"
                                stroke-linejoin="round"
                                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>

                        </svg>

                    </button>

                </div>
            </div>

            <!-- ================= MOBILE MENU ================= -->
            <div id="mobileOverlay"
                class="fixed inset-0 bg-black/50 opacity-0 invisible transition-all duration-300 lg:hidden z-40">

                <div id="mobileMenu"
                    class="absolute left-0 top-0 h-screen w-[85%] max-w-[320px] bg-white shadow-2xl
                            -translate-x-full transition-transform duration-300 ease-in-out">

                    <div class="px-5 py-6">

                        <!-- Top -->
                        <div class="flex items-center justify-between pb-5 border-b">

                            <h3 class="text-xl font-bold text-primary">
                                MANC Riders
                            </h3>

                            <!-- Close Button -->
                            <button id="closeMenu"
                                    class="w-10 h-10 rounded-lg bg-gray-100 flex items-center justify-center hover:bg-gray-200">

                                <svg xmlns="http://www.w3.org/2000/svg"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke-width="1.5"
                                    stroke="currentColor"
                                    class="w-6 h-6">

                                    <path stroke-linecap="round"
                                        stroke-linejoin="round"
                                        d="M6 18L18 6M6 6l12 12" />
                                </svg>

                            </button>

                        </div>

                        <!-- Menu Links -->
                        <div class="flex flex-col mt-6 space-y-1">

                            <a href="#" class="mobile-link text-dark-900 rounded-xl px-4 py-3 font-medium hover:bg-primary/5">
                                Home
                            </a>

                            <a href="#" class="mobile-link text-dark-900 rounded-xl px-4 py-3 font-medium hover:bg-primary/5">
                                Services
                            </a>

                            <a href="#" class="mobile-link text-dark-900 rounded-xl px-4 py-3 font-medium hover:bg-primary/5">
                                About Us
                            </a>

                            <a href="#" class="mobile-link text-dark-900 rounded-xl px-4 py-3 font-medium hover:bg-primary/5">
                                Contact
                            </a>

                        </div>

                        <!-- Buttons -->
                        <div class="grid grid-cols-2 gap-3 pt-8">

                            <!-- <a href="#"
                            class="mobile-link h-12 rounded-full border border-primary text-dark-900 flex items-center justify-center">

                                Login

                            </a> -->

                            <a href="#"
                            class="mobile-link h-12 rounded-full bg-secondary text-white font-semibold flex items-center justify-center">

                                Register

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </nav>
    </header>
