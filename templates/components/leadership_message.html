{% load static %}
<section class="md-message section-padding bg-linear-to-t  from-secondary-100 via-primary-50 to-secondary-100 ">
    <div class="container">

        <div class="md:flex gap-8">
            <div class="w-full lg:w-[340px] fle">
                <img src="{{ leadership_message.photo.url }}" class="w-[240px] md:w-full h-auto object-contain border border-4 border-accent shadow-2xl" alt="">
                <div class="border-l-12 border-secondary ps-5 mt-6">
                    <h5 class="capitalize text-dark text-2xl font-semibold">{{ leadership_message.name }}</h5>
                    <p class="text-base text-dark-800 font-medium">{{ leadership_message.designation }}</p>
                </div>
            </div>
            
            <div>
                <h1 class="section-title text-dark capitalize hidden lg:block">{{ leadership_message.heading }}</h1>
                <p class="text-secondary text-lg font-medium capitalize mt-8 lg:mt-12">Message From</p>
                <h2 class="font-semibold text-dark text-2xl text-dark">{{ leadership_message.designation }}</h2>

                <p class="mt-6 text-dark-800 ">{{ leadership_message.message_01 }}</p>

                <p class="mt-3 text-dark-800 ">{{ leadership_message.message_02 }}</p>

                <a href="#" class="block group mt-8 text-primary underline font-medium text-base hover:text-secondary transition duration-300">
                    know More<i class="fa-solid fa-arrow-right-long ms-2 group-hover:translate-x-1 transition-all duration-300"></i>
                </a>
            </div>
        </div>
    </div>
</section>
