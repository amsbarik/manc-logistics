<section class="section-padding pb-64 lg:pb-44 px-5 bg-primary-50">

    <div class="max-w-6xl mx-auto px-5">

        <!-- Section Heading -->
        <div class="section-head text-center max-w-9/10 mx-auto">
            <h2 class="heading-center">General FAQs</h2>
            <h1 class="section-title">Your Food Delivery Related FAQs</h1>
            <!-- <p class="text-base/7 text-dark">We follow a fast and easy process to take your order, assign a rider, and deliver your food hot and fresh to your doorstep.</p> -->
        </div>


        <!-- Tabs -->
        <div class="flex justify-center">

            <div class="inline-flex p-4">
                <button data-tab="customer" class="tab-btn min-w-[160px] px-4 lg:px-6 py-2 lg:py-3 text-base lg:text-lg rounded font-semibold me-4 lg:me-6">I'm a rider </button>
                <button data-tab="rider" class="tab-btn min-w-[160px] px-4 lg:px-6 py-2 lg:py-3 text-base lg:text-lg rounded font-semibold">I'm a Merchant</button>
            </div>

        </div>

        <!-- Content Container -->
        <div id="tab-container" class="mt-10 lg:mt-12 relative min-h-[400px]">

            <!-- Customer -->
            <div id="customer" class="tab-content absolute top-0 left-0 w-full opacity-0 translate-y-10 pointer-events-none transition-all duration-[900ms]">

                <div class="space-y-8">

                    <!-- FAQ List -->
                    <div class="space-y-10">

                        <!-- FAQ Item 1 -->
                         {% for faq in faqs_rider %}
                        <div class="faq-item {% if forloop.first %} active {% endif %}">
                            <button class="faq-btn w-full flex items-start gap-4 md:gap-8 text-left">
                                <div class="icon-wrap -mt-[12px] lg:-mt-[16px] text-[32px] lg:text-[38px] w-[36px]  flex justify-center items-center flex-shrink-0  transition-transform duration-500">
                                    <span class="icon-plus text-secondary">+</span>
                                    <span class="icon-minus text-primary hidden">−</span>
                                </div>

                                <div class="w-full">
                                    <h3 class="faq-question text-lg md:text-xl xl:text-2xl font-medium transition-all duration-500"> {{ faq.question }} </h3>
                                    <div class="faq-content h-0 overflow-hidden opacity-0 transition-all duration-500">

                                        <div class="mt-3 lg:mt-4 xl:pt-6">
                                            <p class="text-dark-800 text-sm/6 md:text-base/7 xl:text-lg/8"> {{ faq.answer }}</p>
                                        </div>

                                    </div>
                                </div>
                            </button>
                        </div>
                        {% endfor %}

                    </div>

                </div>

            </div>

            <!-- Rider -->
            <div id="rider" class="tab-content absolute top-0 left-0 w-full opacity-0 translate-y-10 pointer-events-none transition-all duration-[900ms]">

                <div class="space-y-8">

                    <!-- FAQ List -->
                    <div class="space-y-10">

                        <!-- FAQ Item 1 -->
                         
                         {% for faq in faqs_merchant %}
                        <div class="faq-item active">
                            <button class="faq-btn w-full flex items-start gap-6 md:gap-8 text-left">
                                <div class="icon-wrap -mt-[16px] text-[38px] w-[35px]  flex justify-center items-center flex-shrink-0  transition-transform duration-500">
                                    <span class="icon-plus text-secondary">+</span>
                                    <span class="icon-minus text-primary hidden">−</span>
                                </div>

                                <div class="w-full">
                                    <h3 class="faq-question text-xl md:text-2xl font-medium transition-all duration-500">{{ faq.question }} </h3>
                                    <div class="faq-content h-0 overflow-hidden opacity-0 transition-all duration-500">

                                        <div class="pt-6">
                                            <p class="text-gray-600 leading-9">  {{ faq.answer }}</p>
                                        </div>

                                    </div>
                                </div>
                            </button>
                        </div>
                        {% endfor %}

                    </div>

                </div>

            </div>



        </div>

    </div>

</section>
