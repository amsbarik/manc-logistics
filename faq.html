<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MANC Riders FAQ</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

:root{
    --primary:#E7000B;
    --secondary:#0EA5E9;
    --accent:#FACC15;
}

body{
    background:#f7f7f7;
}


/* FAQ content animation */

.faq-content{
    height:0;
    overflow:hidden;
    opacity:0;

    transition:
        height .32s linear,
        opacity .25s linear;

    will-change:height;
}


/* Question active color */

.faq-question{
    transition:.25s linear;
}

.faq-item.active .faq-question{
    color:var(--primary);
}


/* Plus / Minus */

.icon-minus{
    display:none;
}

.faq-item.active .icon-plus{
    display:none;
}

.faq-item.active .icon-minus{
    display:block;
}


/* icon rotate */

.icon-wrap{
    transition:.32s linear;
}

.faq-item.active .icon-wrap{
    transform:rotate(180deg);
}


/* mobile */

@media(max-width:768px){

    .faq-btn{
        gap:16px !important;
    }

    .faq-question{
        font-size:18px;
    }

}

</style>

</head>

<body>

<section class="py-20 px-5">

<div class="max-w-6xl mx-auto">


<!-- Heading -->

<div class="text-center mb-16">

<h1 class="text-3xl md:text-5xl font-bold">

Your Delivery Related Questions

</h1>

</div>



<!-- FAQ list -->

<div class="space-y-10">


<!-- Item 1 -->

<div class="faq-item active">

<button
class="faq-btn w-full flex items-start gap-8 text-left">

<div class="icon-wrap text-[38px] w-[35px] flex justify-center flex-shrink-0 mt-[-6px]">

<span class="icon-plus text-[var(--secondary)]">
+
</span>

<span class="icon-minus text-[var(--primary)]">
−
</span>

</div> 





<div class="w-full">

<h3 class="faq-question text-xl md:text-2xl font-medium">

How can I send products through MANC Riders?

</h3>

<div class="faq-content">

<div class="pt-6">

<p class="text-gray-600 leading-9">

MANC Riders provides reliable delivery services. 
Create a shipment through your dashboard by entering customer details, pickup information, and payment instructions.

Same-day and fragile delivery options are available.

</p>

</div>

</div>

</div>

</button>

</div>



<!-- Item 2 -->

<div class="faq-item">

<button
class="faq-btn w-full flex items-start gap-8 text-left">

<div class="icon-wrap text-[38px] w-[35px] flex justify-center flex-shrink-0 mt-[-6px]">

<span class="icon-plus text-[var(--secondary)]">
+
</span>

<span class="icon-minus text-[var(--primary)]">
−
</span>

</div>

<div class="w-full">

<h3 class="faq-question text-xl md:text-2xl font-medium">

What are the delivery charges?

</h3>

<div class="faq-content">

<div class="pt-6">

<p class="text-gray-600 leading-9">

Delivery charges depend on distance, package size and delivery type.

</p>

</div>

</div>

</div>

</button>

</div>



<!-- Item 3 -->

<div class="faq-item">

<button
class="faq-btn w-full flex items-start gap-8 text-left">

<div class="icon-wrap text-[38px] w-[35px] flex justify-center flex-shrink-0 mt-[-6px]">

<span class="icon-plus text-[var(--secondary)]">
+
</span>

<span class="icon-minus text-[var(--primary)]">
−
</span>

</div>

<div class="w-full">

<h3 class="faq-question text-xl md:text-2xl font-medium">

Which areas are covered by MANC Riders?

</h3>

<div class="faq-content">

<div class="pt-6">

<p class="text-gray-600 leading-9">

MANC Riders currently supports nationwide delivery services.

</p>

</div>

</div>

</div>

</button>

</div>



<!-- Item 4 -->

<div class="faq-item">

<button
class="faq-btn w-full flex items-start gap-8 text-left">

<div class="icon-wrap text-[38px] w-[35px] flex justify-center flex-shrink-0 mt-[-6px]">

<span class="icon-plus text-[var(--secondary)]">
+
</span>

<span class="icon-minus text-[var(--primary)]">
−
</span>

</div>

<div class="w-full">

<h3 class="faq-question text-xl md:text-2xl font-medium">

How can I track my parcel?

</h3>

<div class="faq-content">

<div class="pt-6">

<p class="text-gray-600 leading-9">

Track parcels through your tracking ID from the dashboard.

</p>

</div>

</div>

</div>

</button>

</div>


</div>

</div>

</section>



<script>

const faqItems=document.querySelectorAll(".faq-item");


function openItem(item){

    const content=item.querySelector(".faq-content");

    item.classList.add("active");

    content.style.opacity="1";

    content.style.height=content.scrollHeight+"px";
}


function closeItem(item){

    const content=item.querySelector(".faq-content");

    item.classList.remove("active");

    content.style.height="0px";

    content.style.opacity="0";

}



/* First item open */

window.addEventListener("load",()=>{

const first=document.querySelector(".faq-item.active");

const content=first.querySelector(".faq-content");

content.style.height=content.scrollHeight+"px";

content.style.opacity="1";

});



faqItems.forEach(item=>{

const button=item.querySelector(".faq-btn");

button.addEventListener("click",()=>{

const alreadyOpen=item.classList.contains("active");


faqItems.forEach(faq=>{

if(faq!==item){

closeItem(faq);

}

});


if(alreadyOpen){

closeItem(item);

}
else{

openItem(item);

}

});

});


</script>


</body>
</html>
