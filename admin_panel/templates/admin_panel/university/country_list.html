{% extends 'admin_panel/layouts/master.html' %}
{% load custom_filters %}
{% load static %}

{% block title %} Country List {% endblock title %}

{% block content %}

<!-- Heading & Utilities -->
<div class="row g-3 mb-4 align-items-center justify-content-between">
    <div class="col-auto">
        <h1 class="app-page-title mb-0">Country List</h1>
    </div>
    <div class="col-auto">
        <div class="page-utilities">
            <div class="row g-2 align-items-center">

                <!-- Per Page Dropdown -->
                <div class="col-auto">
                    <form method="get" class="d-flex align-items-center">
                        <label class="me-2">Show:</label>
                        <select name="per_page" class="form-select" onchange="this.form.submit()" style="width:auto;">
                            <option value="15" {% if per_page == 15 %}selected{% endif %}>15</option>
                            <option value="25" {% if per_page == 25 %}selected{% endif %}>25</option>
                            <option value="50" {% if per_page == 50 %}selected{% endif %}>50</option>
                            <option value="100" {% if per_page == 100 %}selected{% endif %}>100</option>
                        </select>
                    </form>
                </div>

                <!-- Search Form -->
                <div class="col-auto">
                    <form id="search-form" class="table-search-form row gx-1 align-items-center">
                        <div class="col-auto">
                            <input type="text" name="search" id="search" value="{{ search }}" 
                                   class="form-control" placeholder="Search by name" style="padding: 17px;">
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="btn app-btn-secondary">Search</button>
                        </div>
                    </form>
                </div>

                <!-- Add New -->
                <div class="col-auto">
                    <a href="{% url 'country_form' %}" class="btn btn-primary">Add New Country</a>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Country Table -->
<div class="app-card app-card-orders-table shadow-sm mb-5">
    <div class="app-card-body">
        <div class="table-responsive" id="country-table">
            {% include 'admin_panel/university/country_table.html' %}
        </div>
    </div>
</div>


<script>
$(document).ready(function () {
    function loadCountries(url) {
        $.ajax({
            url: url,
            type: 'GET',
            data: $('#search-form').serialize(),
            headers: { "X-Requested-With": "XMLHttpRequest" },
            success: function (data) {
                $('#country-table').html(data.html);
            }
        });
    }

    // Search
    $('#search-form').on('submit', function (e) {
        e.preventDefault();
        loadCountries("{% url 'country_list' %}");
    });

    // Pagination
    $(document).on('click', '.pagination a', function (e) {
        e.preventDefault();
        let url = $(this).attr('href');
        loadCountries(url);
    });
});
</script>

{% endblock content %}
