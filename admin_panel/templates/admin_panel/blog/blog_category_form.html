{% extends 'admin_panel/layouts/master.html' %}
{% load crispy_forms_tags %}
{% block title %} Blog Category Form {% endblock title %}

{% block content %}

<h1 class="app-page-title mt-lg-4 mb-0">Blog Category Form</h1>
<hr>

<form action="" method="POST" class="form" enctype="multipart/form-data"> {% csrf_token %}
    
    <div class="row row-cols-1">
        <div class="col">
            {{ form.name | as_crispy_field }}
        </div>
    </div>

    <div class="mt-3">
        {{ form.is_active | as_crispy_field }}
    </div>
    
    <button type="submit" class="btn btn-primary mt-4 me-3">Submit</button>
    <a href="{% url 'blog_category_list' %}" class="btn btn-dark mt-4"> Cancel</a>
</form>
			 





{% endblock content %}
