<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MANC Riders FAQ</title>
<link rel="stylesheet" href="static/dist/style.css">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-50">


<section class="py-20 px-5">

<div class="max-w-6xl mx-auto">


<!-- Heading -->

<div class="text-center mb-16">

<h1 class="text-3xl md:text-5xl font-bold text-dark">

Your Delivery Related Questions

</h1>

</div>



<!-- FAQ List -->

<div class="space-y-10">


<!-- FAQ Item 1 -->

<div class="faq-item active">

<button
class="faq-btn w-full flex items-start gap-6 md:gap-8 text-left">

    <span class="icon-plus text-secondary -mt-[14px]">+</span>

    <span class="icon-minus text-primary hidden mt-[50px] block">−</span>

</div>


<div class="w-full">

<h3 class="faq-question text-xl md:text-2xl font-medium transition-all duration-500">

How can I send products through MANC Riders?

</h3>

<div
class="faq-content h-0 overflow-hidden opacity-0 transition-all duration-500">

<div class="pt-6">

<p class="text-gray-600 leading-9">

MANC Riders provides reliable delivery services.
Create shipments through your dashboard using customer details, pickup location and payment information.

Same-day and fragile delivery options are available.

</p>

</div>

</div>

</div>

</button>

</div>




<!-- FAQ Item 2 -->

<div class="faq-item">

<button
class="faq-btn w-full flex items-start gap-6 md:gap-8 text-left">

<div
class="icon-wrap text-[38px] w-[35px] flex justify-center items-center flex-shrink-0 -mt-[14px] transition-transform duration-500">

<span class="icon-plus text-secondary">
+
</span>

<span class="icon-minus text-primary hidden">
−
</span>

</div>


<div class="w-full">

<h3 class="faq-question text-xl md:text-2xl font-medium transition-all duration-500">

What are the delivery charges?

</h3>

<div
class="faq-content h-0 overflow-hidden opacity-0 transition-all duration-500">

<div class="pt-6">

<p class="text-gray-600 leading-9">

Delivery charges depend on parcel size, location and delivery type.

</p>

</div>

</div>

</div>

</button>

</div>





<!-- FAQ Item 3 -->

<div class="faq-item">

<button
class="faq-btn w-full flex items-start gap-6 md:gap-8 text-left">

<div
class="icon-wrap text-[38px] w-[35px] flex justify-center items-center flex-shrink-0 -mt-[14px] transition-transform duration-500">

<span class="icon-plus text-secondary">
+
</span>

<span class="icon-minus text-primary hidden">
−
</span>

</div>


<div class="w-full">

<h3 class="faq-question text-xl md:text-2xl font-medium transition-all duration-500">

Which areas are covered by MANC Riders?

</h3>

<div
class="faq-content h-0 overflow-hidden opacity-0 transition-all duration-500">

<div class="pt-6">

<p class="text-gray-600 leading-9">

MANC Riders currently supports nationwide delivery services.

</p>

</div>

</div>

</div>

</button>

</div>





<!-- FAQ Item 4 -->

<div class="faq-item">

<button
class="faq-btn w-full flex items-start gap-6 md:gap-8 text-left">

<div
class="icon-wrap text-[38px] w-[35px] flex justify-center items-center flex-shrink-0 -mt-[14px] transition-transform duration-500">

<span class="icon-plus text-secondary">
+
</span>

<span class="icon-minus text-primary hidden">
−
</span>

</div>


<div class="w-full">

<h3 class="faq-question text-xl md:text-2xl font-medium transition-all duration-500">

How can I track my parcel?

</h3>

<div
class="faq-content h-0 overflow-hidden opacity-0 transition-all duration-500">

<div class="pt-6">

<p class="text-gray-600 leading-9">

Track your parcel using your tracking ID from the dashboard.

</p>

</div>

</div>

</div>

</button>

</div>


</div>

</div>

</section>



<script>

const faqItems=document.querySelectorAll('.faq-item');


function openItem(item){

const content=item.querySelector('.faq-content');
const plus=item.querySelector('.icon-plus');
const minus=item.querySelector('.icon-minus');
const icon=item.querySelector('.icon-wrap');
const question=item.querySelector('.faq-question');

item.classList.add('active');

content.style.height=content.scrollHeight+'px';
content.classList.remove('opacity-0');
content.classList.add('opacity-100');

plus.classList.add('hidden');
minus.classList.remove('hidden');

icon.classList.add('rotate-180');

question.classList.add('text-primary');

}



function closeItem(item){

const content=item.querySelector('.faq-content');
const plus=item.querySelector('.icon-plus');
const minus=item.querySelector('.icon-minus');
const icon=item.querySelector('.icon-wrap');
const question=item.querySelector('.faq-question');

item.classList.remove('active');

content.style.height='0px';
content.classList.remove('opacity-100');
content.classList.add('opacity-0');

plus.classList.remove('hidden');
minus.classList.add('hidden');

icon.classList.remove('rotate-180');

question.classList.remove('text-primary');

}



window.addEventListener('load',()=>{

const first=document.querySelector('.faq-item.active');

openItem(first);

});



faqItems.forEach(item=>{

item.querySelector('.faq-btn')
.addEventListener('click',()=>{

const isActive=item.classList.contains('active');

faqItems.forEach(faq=>{

if(faq!==item){

closeItem(faq);

}

});

if(isActive){

closeItem(item);

}else{

openItem(item);

}

});

});


</script>


</body>
</html>
