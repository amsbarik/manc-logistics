<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>MANC Riders FAQ</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

:root{
    --primary:#E7000B;
    --secondary:#0EA5E9;
    --accent:#FACC15;
}

body{
    background:#f7f7f7;
}


/* Smooth accordion animation */

.faq-content{
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition:
    max-height .6s ease,
    opacity .4s ease,
    margin .4s ease;
}

.faq-item.active .faq-content{
    max-height:300px;
    opacity:1;
    margin-top:15px;
}


/* Plus / Minus */

.icon-minus{
    display:none;
}

.faq-item.active .icon-plus{
    display:none;
}

.faq-item.active .icon-minus{
    display:block;
}


/* Question color transition */

.faq-question{
    transition:.4s;
}

.faq-item.active .faq-question{
    color:var(--primary);
}

</style>

</head>


<body>


<section class="py-20 px-5">

<div class="max-w-6xl mx-auto">


    <!-- Heading -->

    <div class="text-center mb-16">

        <h1 class="text-3xl md:text-5xl font-bold">
            Your Delivery Related Questions
        </h1>

    </div>


    <!-- FAQ -->

    <div class="space-y-10">


        <!-- FAQ Item 1 -->

        <div class="faq-item active">

            <button
            class="faq-btn w-full flex items-start gap-8 text-left">

                <!-- icon -->

                <div
                class="w-[30px] flex justify-center text-[38px] mt-[-6px] flex-shrink-0">

                    <span class="icon-plus text-[var(--primary)]">
                        +
                    </span>

                    <span class="icon-minus text-[var(--primary)]">
                        −
                    </span>

                </div>


                <!-- Question -->

                <div class="w-full">

                    <h3 class="faq-question text-xl md:text-2xl font-medium">

                        How can I send products through MANC Riders?

                    </h3>


                    <div class="faq-content">

                        <p class="pt-6 text-gray-600 leading-9">

                            MANC Riders provides fast and reliable parcel delivery services. 
                            Create a shipment from your dashboard by entering customer information, pickup details, payment information, and delivery instructions.

                            Same-day and fragile delivery options are also available for selected locations.

                        </p>

                    </div>

                </div>

            </button>

        </div>



        <!-- FAQ Item 2 -->

        <div class="faq-item">

            <button
            class="faq-btn w-full flex items-start gap-8 text-left">

                <div
                class="w-[30px] flex justify-center text-[38px] mt-[-6px] flex-shrink-0">

                    <span class="icon-plus text-[var(--primary)]">
                        +
                    </span>

                    <span class="icon-minus text-[var(--primary)]">
                        −
                    </span>

                </div>

                <div class="w-full">

                    <h3 class="faq-question text-xl md:text-2xl font-medium">

                        What are the cash on delivery charges?

                    </h3>

                    <div class="faq-content">

                        <p class="pt-6 text-gray-600 leading-9">

                            Delivery fees depend on package size,
                            weight and destination location.

                        </p>

                    </div>

                </div>

            </button>

        </div>



        <!-- FAQ Item 3 -->

        <div class="faq-item">

            <button
            class="faq-btn w-full flex items-start gap-8 text-left">

                <div
                class="w-[30px] flex justify-center text-[38px] mt-[-6px] flex-shrink-0">

                    <span class="icon-plus text-[var(--primary)]">
                        +
                    </span>

                    <span class="icon-minus text-[var(--primary)]">
                        −
                    </span>

                </div>

                <div class="w-full">

                    <h3 class="faq-question text-xl md:text-2xl font-medium">

                        Which areas are covered by MANC Riders?

                    </h3>

                    <div class="faq-content">

                        <p class="pt-6 text-gray-600 leading-9">

                            MANC Riders currently supports city and regional delivery services with expanding nationwide coverage.

                        </p>

                    </div>

                </div>

            </button>

        </div>



        <!-- FAQ Item 4 -->

        <div class="faq-item">

            <button
            class="faq-btn w-full flex items-start gap-8 text-left">

                <div
                class="w-[30px] flex justify-center text-[38px] mt-[-6px] flex-shrink-0">

                    <span class="icon-plus text-[var(--primary)]">
                        +
                    </span>

                    <span class="icon-minus text-[var(--primary)]">
                        −
                    </span>

                </div>

                <div class="w-full">

                    <h3 class="faq-question text-xl md:text-2xl font-medium">

                        How can I track my parcel?

                    </h3>

                    <div class="faq-content">

                        <p class="pt-6 text-gray-600 leading-9">

                            Use your parcel tracking ID in your dashboard
                            to monitor delivery status in real time.

                        </p>

                    </div>

                </div>

            </button>

        </div>


    </div>

</div>

</section>



<script>

const faqItems=document.querySelectorAll(".faq-item");

faqItems.forEach(item=>{

    item.querySelector(".faq-btn")
    .addEventListener("click",()=>{


        faqItems.forEach(other=>{

            if(other!==item){

                other.classList.remove("active");

            }

        });


        item.classList.toggle("active");

    });

});

</script>

</body>
</html>
